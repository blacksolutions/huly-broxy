---
- name: Deploy huly-bridge (per-workspace template instances)
  hosts: bridge
  gather_facts: false
  become: true

  pre_tasks:
    - name: Verify local binary exists
      ansible.builtin.stat:
        path: "{{ bridge_binary_local }}"
      delegate_to: localhost
      become: false
      register: local_bin

    - name: Fail if binary missing
      ansible.builtin.fail:
        msg: "Binary not found at {{ bridge_binary_local }} — run `make linux` first."
      when: not local_bin.stat.exists

    - name: Verify each workspace has a vault config
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/files/workspaces/{{ item }}.toml"
      delegate_to: localhost
      become: false
      loop: "{{ bridge_workspaces }}"
      register: local_ws_cfgs

    - name: Fail if any workspace vault config is missing
      ansible.builtin.fail:
        msg: >-
          Missing vault config for workspace '{{ item.item }}' at
          {{ playbook_dir }}/files/workspaces/{{ item.item }}.toml — see
          ansible/README.md (per-workspace vault workflow).
      loop: "{{ local_ws_cfgs.results }}"
      loop_control:
        label: "{{ item.item }}"
      when: not item.stat.exists

  tasks:
    - name: Ensure config dir exists
      ansible.builtin.file:
        path: "{{ bridge_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure workspaces.d dir exists
      ansible.builtin.file:
        path: "{{ bridge_workspaces_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install systemd template unit
      ansible.builtin.copy:
        src: "{{ bridge_unit_local }}"
        dest: "{{ bridge_unit_path }}"
        mode: "0644"
        owner: root
        group: root
      notify: Reload systemd

    - name: Install huly-bridge binary
      ansible.builtin.copy:
        src: "{{ bridge_binary_local }}"
        dest: "{{ bridge_install_path }}"
        mode: "0755"
        owner: root
        group: root
      notify: Restart all bridge instances

    - name: Render per-workspace configs (vault-decrypted)
      ansible.builtin.copy:
        src: "files/workspaces/{{ item }}.toml"
        dest: "{{ bridge_workspaces_dir }}/{{ item }}.toml"
        mode: "0640"
        owner: root
        group: root
      loop: "{{ bridge_workspaces }}"
      loop_control:
        label: "{{ item }}"
      no_log: true
      notify: Restart changed bridge instance
      register: rendered_configs

    - name: Flush handlers before enabling instances
      ansible.builtin.meta: flush_handlers

    - name: Enable and start huly-bridge@<ws> for each workspace
      ansible.builtin.systemd:
        name: "huly-bridge@{{ item }}.service"
        enabled: true
        state: started
        daemon_reload: true
      loop: "{{ bridge_workspaces }}"
      loop_control:
        label: "{{ item }}"

    # ---- Legacy single-instance cleanup ------------------------------------
    - name: Check for legacy single-instance unit
      ansible.builtin.stat:
        path: "{{ bridge_legacy_unit_path }}"
      register: legacy_unit

    - name: Disable legacy single-instance service if present
      ansible.builtin.systemd:
        name: "{{ bridge_legacy_service }}.service"
        enabled: false
        state: stopped
      when: legacy_unit.stat.exists
      failed_when: false

    - name: Remove legacy single-instance unit file
      ansible.builtin.file:
        path: "{{ bridge_legacy_unit_path }}"
        state: absent
      when: legacy_unit.stat.exists
      notify: Reload systemd

    - name: Remove legacy single-instance config
      ansible.builtin.file:
        path: "{{ bridge_legacy_config_path }}"
        state: absent

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart all bridge instances
      ansible.builtin.systemd:
        name: "huly-bridge@{{ item }}.service"
        state: restarted
      loop: "{{ bridge_workspaces }}"

    - name: Restart changed bridge instance
      ansible.builtin.systemd:
        name: "huly-bridge@{{ item.item }}.service"
        state: restarted
      loop: "{{ rendered_configs.results | default([]) }}"
      loop_control:
        label: "{{ item.item }}"
      when: item.changed | default(false)

  post_tasks:
    - name: Wait for instances to settle
      ansible.builtin.pause:
        seconds: 3

    - name: Check each instance is active
      ansible.builtin.command: "systemctl is-active huly-bridge@{{ item }}.service"
      register: svc_active
      changed_when: false
      failed_when: svc_active.stdout != "active"
      loop: "{{ bridge_workspaces }}"
      loop_control:
        label: "{{ item }}"

    - name: Show recent logs per workspace
      ansible.builtin.command: "journalctl -u huly-bridge@{{ item }}.service -n 20 --no-pager"
      register: svc_logs
      changed_when: false
      failed_when: false
      loop: "{{ bridge_workspaces }}"
      loop_control:
        label: "{{ item }}"

    - name: Report logs
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ svc_logs.results }}"
      loop_control:
        label: "{{ item.item }}"
