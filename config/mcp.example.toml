[nats]
url = "nats://127.0.0.1:4222"
# credentials = "/path/to/nats.creds"

[mcp]
# Identifier of the calling agent. REQUIRED (P4 / D8): the bridge JWT
# broker logs this for audit and per-agent rate-limit attribution. Failure
# to set it (and the absence of an rmcp clientInfo override) is a fatal
# startup error rather than a silent fallback.
agent_id = "claude-code-murat-001"

# Selected MCP transport. Per the P1 spike, "rest" is the only implemented
# variant in P4; "ws" is reserved for a future variant that talks to the
# transactor over WebSocket directly.
transport = "rest"

[log]
level = "info"
json = false

# Optional: enables huly_sync_status and huly_sync_cards MCP tools, which
# shell out to the upstream Node.js sync pipeline. Omit this whole section to
# disable those tools (they will return a configuration error if invoked).
# [mcp.sync]
# script_path = "/path/to/huly-api/packages/sync/dist/index.js"
# node_binary = "node"      # default
# working_dir = "."         # affects .huly-sync-state.json + docs/ resolution
# timeout_secs = 300        # kill subprocess if it exceeds this many seconds
